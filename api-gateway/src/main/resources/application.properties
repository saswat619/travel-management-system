spring.application.name=api-gateway
server.port=9002
spring.config.import=optional:configserver:http://localhost:9001

eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=iam-service
spring.cloud.gateway.routes[0].uri=lb://iam-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/iam/**

spring.cloud.gateway.routes[1].id=partner-inventory-service
spring.cloud.gateway.routes[1].uri=lb://partner-inventory-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/partner/**

spring.cloud.gateway.routes[2].id=booking-service
spring.cloud.gateway.routes[2].uri=lb://booking-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/booking/**

spring.cloud.gateway.routes[3].id=itinerary-service
spring.cloud.gateway.routes[3].uri=lb://itinerary-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/itinerary/**

spring.cloud.gateway.routes[4].id=billing-payment-service
spring.cloud.gateway.routes[4].uri=lb://billing-payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/billing/**

spring.cloud.gateway.routes[5].id=compliance-audit-service
spring.cloud.gateway.routes[5].uri=lb://compliance-audit-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/compliance/**

spring.cloud.gateway.routes[6].id=analytics-service
spring.cloud.gateway.routes[6].uri=lb://analytics-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/analytics/**

spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notification/**

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=Authorization

jwt.secret=dHJhdmVsTWFuYWdlbWVudFN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNFdpdGhFeHRyYUxlbmd0aA==

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

logging.level.com.travel=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# Swagger aggregation routes - forward /api-docs/{service} to each service's /v3/api-docs
spring.cloud.gateway.routes[8].id=iam-service-docs
spring.cloud.gateway.routes[8].uri=lb://iam-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api-docs/iam
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api-docs/iam, /v3/api-docs

