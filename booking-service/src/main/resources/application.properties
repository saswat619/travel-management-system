spring.application.name=booking-service
spring.config.import=optional:configserver:http://localhost:9001
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Server
server.port=9005

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/travel_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=dHJhdmVsTWFuYWdlbWVudFN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMjAyNFdpdGhFeHRyYUxlbmd0aA==

# Feign
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.partnerService.sliding-window-size=10
resilience4j.circuitbreaker.instances.partnerService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.partnerService.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.partnerService.permitted-number-of-calls-in-half-open-state=3

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# SpringDoc - advertise gateway as server
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.servers[0].url=http://localhost:9002
springdoc.servers[0].description=Travel360 API Gateway

# Logging
logging.level.com.travel.booking=DEBUG
